# Redis configuration for Face Match demo
# Redis 8.2 with SVS-VAMANA vector search support

# Persistence configuration
# Save after 900 seconds if at least 1 key changed
save 900 1
# Save after 300 seconds if at least 10 keys changed
save 300 10
# Save after 60 seconds if at least 10000 keys changed
save 60 10000

# RDB persistence
dbfilename dump.rdb
dir /data

# AOF persistence for better durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory configuration
maxmemory 2gb
maxmemory-policy allkeys-lru

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Logging
loglevel notice
logfile ""

# RediSearch/Vector configuration
# (Redis 8.2 includes built-in vector search)

# Network
bind 0.0.0.0
protected-mode no
port 6379

# Performance
tcp-backlog 511
timeout 0
tcp-keepalive 300
